name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      UPDATE_PROVIDER: github
      UPDATE_OWNER: ${{ github.repository_owner }}
      UPDATE_REPO: ${{ github.event.repository.name }}
      CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      CSC_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
      WIN_CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE_P12 }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Apple notarization key
        if: runner.os == 'macOS' && secrets.APPLE_API_KEY != ''
        shell: bash
        run: |
          mkdir -p private_keys
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "${{ secrets.APPLE_API_KEY }}" > "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build desktop installers
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            npm run dist:mac
          else
            npm run dist:win
          fi

      - name: Upload desktop installers
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: release/**
          if-no-files-found: error

      - name: Build and publish desktop app
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run release:desktop
