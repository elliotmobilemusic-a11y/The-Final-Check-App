<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#10141b" />
    <link rel="icon" type="image/png" href="/the-final-check-favicon.png" />
    <link rel="apple-touch-icon" href="/the-final-check-favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>The Final Check</title>
    <script>
      // Catch browser extension errors BEFORE any other code runs
      window.addEventListener('unhandledrejection', function(event) {
        try {
          const msg = (event.reason?.message || event.reason || '').toString();
          if (msg.includes('No Listener: tabs:outgoing.message.ready')) {
            event.stopImmediatePropagation();
            event.preventDefault();
            return false;
          }
        } catch (e) {}
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
